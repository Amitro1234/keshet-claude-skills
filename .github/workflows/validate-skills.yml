name: Validate skills

on:
  pull_request:
    paths:
      - "**/SKILL.md"
      - "tools/validate-skills.ps1"
      - ".github/workflows/validate-skills.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run skill structure validator
        shell: pwsh
        run: ./tools/validate-skills.ps1
